version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    image: nginx:alpine
    container_name: frontend_app
    ports:
      - "80:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
    restart: always